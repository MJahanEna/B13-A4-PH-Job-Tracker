<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- tailwind+daisy -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />

    <!-- FONT AWESOME -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body class="bg-[#F8FAFC] py-[24px]">
    <section class="top container mx-auto md:w-[1110px]">
      <div>
        <h1 class="text-[32px] font-bold text-[#002C5C] mb-[20px]">
          Job Application Tracker
        </h1>

        <div class="grid grild-cols-1 md:grid-cols-3 gap-[16px]">
          <div
            class="bg-white w-[359px] h-[97px] border border-[#F1F2F4] rounded-lg p-[20px] hover:scale-105 hover:border-blue-600 hover:-translate-y-1 hover:shadow-md"
          >
            <p class="text-[14px] font-medium text-[#323B49] mb-[8px]">Total</p>
            <h2 class="text-[24px] font-bold text-[#002B70]">8</h2>
          </div>
          <div
            class="bg-white w-[359px] h-[97px] border border-[#F1F2F4] rounded-lg p-[20px] hover:border-blue-600 hover:-translate-y-1 hover:shadow-md"
          >
            <p class="text-[14px] font-medium text-[#323B49] mb-[8px]">
              Interview
            </p>
            <h2 class="text-[24px] font-bold text-green-600">0</h2>
          </div>
          <div
            class="bg-white w-[359px] h-[97px] border border-[#F1F2F4] rounded-lg p-[20px] hover:border-blue-600 hover:-translate-y-1 hover:shadow-md"
          >
            <p class="text-[14px] font-medium text-[#323B49] mb-[8px]">
              Rejected
            </p>
            <h2 class="text-[24px] font-bold text-red-600">0</h2>
          </div>
        </div>
      </div>
    </section>
    <div
      class="mt-[30px] mb-[30px] h-[1px] bg-[#E6E7E9] mx-auto md:w-[1110px]"
    ></div>
    <!-- Availables jobs and buttons section -->
<section class="md:w-[1110px] mx-auto mb-[16px]">
      <div class="flex justify-between items-center mb-[24px]">
        <h2 class="text-[20px] font-semibold text-[#002C5C]">Available Jobs</h2>
        <p class="text-[16px] font-medium text-[#64748B]">8 jobs</p>
      </div>
      <div class="gap-[8px] mb-[16px]">
        <button
          id="btn1"
          class="bg-white text-gray-600 text-[12px] font-medium border border-gray-200 hover:border-blue-600 hover:text-blue-600 hover:shadow-md rounded-md w-[80px] h-[32px]"
        >
          All
        </button>
        <button
          id="btn1"
          class="bg-white text-gray-600 text-[12px] font-medium border border-gray-200 hover:border-blue-600 hover:text-blue-600 hover:shadow-md rounded-md w-[80px] h-[32px]"
        >
          Interview
        </button>
        <button
          id="btn1"
          class="bg-white text-gray-600 text-[12px] font-medium border border-gray-200 hover:border-blue-600 hover:text-blue-600 hover:shadow-md rounded-md w-[80px] h-[32px]"
        >
          Rijected
        </button>
      </div>
    </section>
    <!-- No jobs section-->
    <div
      class="bg-white border border-gray-200 rounded-md md:w-[1110px] h-[448px] text-center px-[40px] mx-auto"
    >
      <img src="./jobs.png" class="mx-auto mb-[20px] mt-[111px]" />
      <h2 class="text-[24px] font-semibold text-[#002C5C]">
        No jobs available
      </h2>
      <p class="text-[16px] text-gray-600">
        Check back soon for new job opportunities
      </p>
    </div>
  </body>
</html>
